name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Configure Spotify Client ID
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        run: |
          if [[ -z "$SPOTIFY_CLIENT_ID" ]]; then
            echo "::error::Set SPOTIFY_CLIENT_ID in repo Secrets (Settings → Secrets → Actions)"
            exit 1
          fi
          echo "SPOTIFY_CLIENT_ID = $SPOTIFY_CLIENT_ID" > Secrets.xcconfig

      - name: Verify build settings resolve Spotify Client ID
        run: |
          RESOLVED="$(xcodebuild \
            -project Vinyl.xcodeproj \
            -scheme Vinyl \
            -configuration Release \
            -derivedDataPath build \
            -showBuildSettings 2>/dev/null | sed -n 's/^ *SPOTIFY_CLIENT_ID = //p' | head -1)"
          if [[ -z "$RESOLVED" || "$RESOLVED" == "ci_build_placeholder" || "$RESOLVED" == *"YOUR_"* ]]; then
            echo "::error::SPOTIFY_CLIENT_ID did not resolve in Xcode build settings (got: '${RESOLVED:-<empty>}')"
            exit 1
          fi
          echo "SPOTIFY_CLIENT_ID resolves in build settings."

      - name: Build Release
        run: |
          xcodebuild \
            -project Vinyl.xcodeproj \
            -scheme Vinyl \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify Spotify Client ID is embedded
        run: |
          APP="build/Build/Products/Release/Vinyl.app"
          CLIENT_ID="$(plutil -extract SpotifyClientID raw "$APP/Contents/Info.plist" 2>/dev/null || true)"
          if [[ -z "$CLIENT_ID" || "$CLIENT_ID" == "ci_build_placeholder" || "$CLIENT_ID" == *"YOUR_"* ]]; then
            echo "::error::SpotifyClientID missing or invalid in built app Info.plist"
            plutil -p "$APP/Contents/Info.plist" | grep -i spotify || true
            exit 1
          fi
          echo "SpotifyClientID is present in release build."

      - name: Package
        run: |
          APP="build/Build/Products/Release/Vinyl.app"
          ditto -c -k --keepParent "$APP" Vinyl.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Vinyl.zip
          generate_release_notes: true
